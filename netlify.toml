# Netlify configuration for the Vintage Books "What's On" events page.
# Static HTML — no build step. Files are served straight from the repo root.

[build]
  publish = "."

# Long-cache the self-hosted brand fonts (immutable, content-hashed by URL).
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Flyer artwork gets swapped in place by filename, so always revalidate against
# the ETag instead of caching for days. Updated flyers then appear immediately
# (a 304 keeps the bytes cached when nothing changed).
[[headers]]
  for = "/assets/flyers/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
